name: Deploy to Azure VM

on:
  push:
    branches:
      - main # Memicu deployment otomatis setiap ada perubahan di branch main

jobs:
  deploy:
    name: Provision & Deploy to Azure Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            # 1. Inisialisasi Environment (Bun Runtime)
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            
            # 2. Navigasi ke direktori kerja (Diasumsikan clone manual telah dilakukan)
            cd /home/${{ secrets.AZURE_VM_USERNAME }}/DevOps-PSO
            
            # 3. Sinkronisasi Version Control
            echo "Menarik pembaruan kode terbaru..."
            git pull origin main
            
            # 4. Resolusi Dependensi
            echo "Menginstal paket dependensi..."
            bun install
            
            # 5. Provisi Infrastruktur Database
            echo "Memastikan PostgreSQL dan Redis beroperasi..."
            bun run db:start
            sleep 10
            
            echo "Menerapkan migrasi database..."
            bun run db:push
            
            # 6. Eksekusi Build
            echo "Mem-build aplikasi Web dan API..."
            bun run build
            
            # 7. Restart Layanan
            echo "Menjalankan layanan di background..."
            pkill -f "bun run dev" || true
            nohup bun run dev:server > api_server.log 2>&1 &
            nohup bun run dev:web > web_client.log 2>&1 &
            
            echo "Deployment Tereksekusi dengan Sukses."
